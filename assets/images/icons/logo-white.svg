<!-- FurniStyle Logo White Version -->
<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Background Circle (Optional - Remove for transparent) -->
    <circle cx="100" cy="100" r="95" fill="#ffffff"/>
    
    <!-- Sofa Icon -->
    <g transform="translate(100, 100)">
        <!-- Back -->
        <rect x="-50" y="-35" width="100" height="50" rx="5" fill="#d4af37"/>
        
        <!-- Seat -->
        <rect x="-60" y="10" width="120" height="15" rx="5" fill="#d4af37"/>
        
        <!-- Left Arm -->
        <rect x="-65" y="-25" width="15" height="50" rx="3" fill="#d4af37"/>
        
        <!-- Right Arm -->
        <rect x="50" y="-25" width="15" height="50" rx="3" fill="#d4af37"/>
        
        <!-- Left Leg -->
        <rect x="-50" y="25" width="8" height="20" rx="2" fill="#d4af37"/>
        
        <!-- Right Leg -->
        <rect x="42" y="25" width="8" height="20" rx="2" fill="#d4af37"/>
        
        <!-- Cushion Details -->
        <rect x="-40" y="-10" width="30" height="20" rx="2" fill="#2c3e50" opacity="0.2"/>
        <rect x="10" y="-10" width="30" height="20" rx="2" fill="#2c3e50" opacity="0.2"/>
    </g>
</svg>
